    <script type="text/javascript">

        function sendTestEmail() {
            document.getElementById('status').textContent = "Sending...";
            document.getElementById('clientStatus').textContent = "";
            document.getElementById('adminStatus').textContent = "";
            document.getElementById('errorDetails').textContent = "";
            document.getElementById('errorDetails').style.display = "none";

            const testData = {
                fullName: "Test User",
                email: document.getElementById('email').value || "test@example.com",
                phone: "+1234567890",
                projectType: "web-development",
                budget: "medium",
                timeline: "standard",
                projectDescription: "This is a test email from the test page.",
                contactPreference: "email",
                referralSource: "other"
            };

            // Client template parameters
            const clientTemplateParams = {
                from_name: testData.fullName,
                email: testData.email,
                project_type: getProjectTypeLabel(testData.projectType),
                budget: getBudgetLabel(testData.budget),
                timeline: getTimelineLabel(testData.timeline),
                contact_preference: testData.contactPreference === 'email' ? 'Email' : 'Phone'
            };

            // Admin template parameters - with additional safeguards
            const adminTemplateParams = {
                // Basic info
                from_name: testData.fullName,
                from_email: testData.email,
                email: testData.email, // Some templates use email instead of from_email
                reply_to: testData.email,

                // Contact info
                phone: testData.phone || 'Not provided',
                contact_preference: testData.contactPreference === 'email' ? 'Email' : 'Phone',
                contact_method: testData.contactPreference === 'email' ? 'Email' : 'Phone', // Alternative name

                // Project details
                project_type: getProjectTypeLabel(testData.projectType),
                budget: getBudgetLabel(testData.budget),
                timeline: getTimelineLabel(testData.timeline),

                // Message/description (multiple possible names)
                message: testData.projectDescription || 'No description provided',
                project_description: testData.projectDescription || 'No description provided',
                description: testData.projectDescription || 'No description provided',

                // Additional fields
                referral_source: getReferralLabel(testData.referralSource) || 'Not specified',
                source: getReferralLabel(testData.referralSource) || 'Not specified', // Alternative name
                submission_date: new Date().toLocaleString(),
                date: new Date().toLocaleString(), // Alternative name
                subject: "New Project Request from " + testData.fullName
            };

            // Show parameters for inspection
            document.getElementById('templateParams').textContent = JSON.stringify(adminTemplateParams, null, 2);
            document.getElementById('paramsContainer').style.display = 'block';

            // Send client email
            emailjs.send("service_0gi789q", "template_x46uzk8", clientTemplateParams)
                .then(function(response) {
                    console.log("Client email sent successfully", response);
                    document.getElementById('clientStatus').textContent = "✅ Client email sent!";

                    // Send admin email next
                    return emailjs.send("service_0gi789q", "template_bgnuqvo", adminTemplateParams);
                })
                .then(function(response) {
                    console.log("Admin email sent successfully", response);
                    document.getElementById('adminStatus').textContent = "✅ Admin email sent!";
                    document.getElementById('status').textContent = "Complete!";
                })
                .catch(function(error) {
                    console.error("Failed to send email", error);
                    document.getElementById('status').textContent = "Failed: " + error.text;
                    document.getElementById('errorDetails').textContent = JSON.stringify(error, null, 2);
                    document.getElementById('errorDetails').style.display = "block";
                });
        }

        function getProjectTypeLabel(id) {
            const types = {

                'ai-solution': 'AI Solution',
                'data-analysis': 'Data Analysis',
                'consulting': 'Consulting',
                'other': 'Other'
