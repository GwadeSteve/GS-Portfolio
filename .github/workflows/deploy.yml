name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run Tests
        env:
          CI: true
        run: npm test
        
      - name: Build App
        run: npm run build

  deploy:
    name: Deploy to Render
    needs: build-and-test
    runs-on: ubuntu-latest
    
    environment:
      name: production
      url: https://gwadesteve.onrender.com

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is missing."
            exit 1
          fi
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered successfully!"
