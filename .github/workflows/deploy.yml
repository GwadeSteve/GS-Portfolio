name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    
    # This creates the "Deployment" status in the GitHub UI
    environment:
      name: production
      # UPDATE THIS: Change to your actual Render URL so the "View deployment" button works
      url: https://your-portfolio.onrender.com 

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Error: RENDER_DEPLOY_HOOK secret is missing."
            exit 1
          fi
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered successfully!"
